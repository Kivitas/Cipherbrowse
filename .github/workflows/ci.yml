name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  verify:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
        working-directory: Main
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Syntax check
        run: npm run check

      - name: Regression verify
        run: npm run verify
